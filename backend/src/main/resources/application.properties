spring.application.name=whatcanicook-backend

# MySQL connection (Docker container exposed on 3309)
spring.datasource.url=jdbc:mysql://localhost:3309/WhatCanICook?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Optional: format SQL in logs
spring.jpa.properties.hibernate.format_sql=true

# Local uploads directory (relative to backend working dir)
app.uploads.dir=uploads

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
