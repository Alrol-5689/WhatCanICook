version: "3.9"

services:

  mysql:
    image: mysql:8.4
    container_name: whatcanicook-mysql
    restart: always
    ports:
      - "3309:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: WhatCanICook

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: